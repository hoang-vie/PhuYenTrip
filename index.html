var CAT={
  bien:{name:'Biển & Đảo',color:'#0288d1',bg:'#e1f5fe',fg:'#01579b'},
  kientruc:{name:'Kiến trúc & Lịch sử',color:'#e53935',bg:'#ffebee',fg:'#b71c1c'},
  sinhthai:{name:'Núi, Hồ & Sinh thái',color:'#43a047',bg:'#e8f5e9',fg:'#1b5e20'}
};

var visible={bien:true,kientruc:true,sinhthai:true};
var layers={};
var map;

function initMap(){
  map=L.map('map',{zoomControl:true,attributionControl:false});
  
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{
    maxZoom:19
  }).addTo(map);

  Object.keys(CAT).forEach(function(k){layers[k]=L.layerGroup().addTo(map)});

  LOCS.forEach(function(loc){
    var cfg=CAT[loc.cat];
    var icon=L.divIcon({
      className:'',
      html:'<div style="width:28px;height:28px;border-radius:50%;background:'+cfg.color+';border:3px solid #fff;box-shadow:0 3px 6px rgba(0,0,0,.3);cursor:pointer;transition:transform 0.2s;" onmouseover="this.style.transform=\'scale(1.2)\'" onmouseout="this.style.transform=\'scale(1)\'"></div>',
      iconSize:[28,28],iconAnchor:[14,14]
    });
    var m=L.marker([loc.lat,loc.lng],{icon:icon});
    m.on('click',function(){showPopup(loc)});
    layers[loc.cat].addLayer(m);
  });

  var all=[];
  LOCS.forEach(function(l){all.push([l.lat,l.lng])});
  map.fitBounds(L.latLngBounds(all),{padding:[50,50]});

  document.querySelectorAll('.leg').forEach(function(el){
    el.addEventListener('click',function(){
      var cat=el.dataset.cat;
      visible[cat]=!visible[cat];
      if(visible[cat]){
        layers[cat].addTo(map);
        el.style.opacity='1';
        el.style.filter='none';
      }else{
        map.removeLayer(layers[cat]);
        el.style.opacity='0.4';
        el.style.filter='grayscale(100%)';
      }
    });
  });

  var ov=document.getElementById('popup-overlay');
  document.getElementById('close-btn').onclick=function(){ov.style.display='none'};
  ov.addEventListener('click',function(e){if(e.target===ov)ov.style.display='none'});
}

// LOGIC XỬ LÝ 2 ẢNH ĐƯỢC LÀM MỚI TẠI ĐÂY
function showPopup(loc){
  var cfg=CAT[loc.cat];
  var imgContainer = document.getElementById('popup-images-container');
  
  // Reset khung ảnh cũ
  imgContainer.innerHTML = '';
  
  if(loc.images && loc.images.length > 0){
    imgContainer.style.display = 'flex';
    
    // Tự động rải từng ảnh trong thư mục vào giao diện
    loc.images.forEach(function(imgPath) {
        var el = document.createElement('img');
        el.src = imgPath;
        el.style.flex = '1';              // Chia đôi đều 2 ảnh
        el.style.width = '50%';
        el.style.objectFit = 'cover';     // Tránh bị méo ảnh
        
        // NẾU ẢNH CHƯA TẢI HOẶC BỊ LỖI TÊN -> TỰ ẨN ĐI
        el.onerror = function() { this.style.display = 'none'; }; 
        
        imgContainer.appendChild(el);
    });
  } else {
    imgContainer.style.display = 'none';
  }
  
  document.getElementById('popup-cat').textContent=cfg.name;
  document.getElementById('popup-cat').style.background=cfg.bg;
  document.getElementById('popup-cat').style.color=cfg.fg;
  document.getElementById('popup-name').textContent=loc.name;
  document.getElementById('popup-addr').innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; flex-shrink: 0;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> ' + loc.addr;
  
  var descEl = document.getElementById('popup-desc');
  descEl.textContent=loc.desc;
  descEl.style.borderLeftColor = cfg.color;
  
  var ov=document.getElementById('popup-overlay');
  ov.style.display='flex';
}

var s=document.createElement('script');
s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
s.onload=function(){initMap()};
document.head.appendChild(s);
</script>
